<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA S.C.O.U.T</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css  font-family: Arial, sans-serif;
  background:#eef2f6;
}

.header {
  background:#1f2f3a;
  color:white;
  padding:12px;
  text-align:center;
}

.title {
  font-size:22px;
  font-weight:bold;
}

.subtitle {
  font-size:13px;
  opacity:0.85;
}

.container {
  max-width:650px;
  margin:auto;
  padding:15px;
}

.panel {
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
}

.signature {
  position:absolute;
  bottom:6px;
  right:10px;
  font-size:11px;
  color:#777;
  opacity:0.7;
}

textarea {
  width:100%;
  height:100px;
  padding:10px;
  font-size:16px;
  border:1px solid #aaa;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
}

.reset {
  background:#777;
  color:white;
}

.result {
  margin-top:15px;
  padding:15px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
}

.section-title {
  margin-top:10px;
  font-weight:bold;
}

.grid {
  font-size:20px;
  font-weight:bold;
  color:#0078d4;
}

.coord {
  font-family:monospace;
}

#map {
  height:300px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaft>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

// projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +x_0=200000 +y_0=250000");

// map
let map = L.map('map').setView([53.5,-8],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let marker;

// DMS
function toDMS(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=Math.floor((Math.abs(d)-deg)*60);
 let sec=((Math.abs(d)-deg)*3600 - min*60).toFixed(2);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${sec}" ${dir}`;
}

// DDM
function toDMM(d,lat){
 let deg=Math.floor(Math.abs(d));
 let min=((Math.abs(d)-deg)*60).toFixed(4);
 let dir=lat?(d>=0?"N":"S"):(d>=0?"E":"W");
 return `${deg}° ${min}' ${dir}`;
}

// grid letter
function getGridLetter(E,N){
 const grid=[['V','W','X','Y','Z'],['Q','R','S','T','U'],
 ['L','M','N','O','P'],['F','G','H','J','K'],['A','B','C','D','E']];
 return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// simple decimal parser (safe baseline)
function parse(input){
 let m=input.match(/(-?\d+\.\d+).*?(-?\d+\.\d+)/);
 if(m) return {lat:+m[1],lon:+m[2],type:"DD"};
 return null;
}

function convert(){
 let r=parse(input.value);
 if(!r){ result.innerHTML="❌ Invalid"; return;}

 let g=proj4("EPSG:4326","EPSG:29903",[r.lon,r.lat]);
 let E=g[0], N=g[1];

 let e=String(Math.round(E%100000)).padStart(5,'0');
 let n=String(Math.round(N%100000)).padStart(5,'0');

 result.innerHTML=`
 <div class="result">
 <b>Detected:</b> ${r.type}

 <div class="section-title">Irish Grid</div>
 <div class="grid">${getGridLetter(E,N)} ${e} ${n}</div>

 <div class="section-title">DD</div>
 ${r.lat.toFixed(6)}, ${r.lon.toFixed(6)}

 <div class="section-title">DMS</div>
 ${toDMS(r.lat,true)}<br>${toDMS(r.lon,false)}

 <div class="section-title">DDM</div>
 ${toDMM(r.lat,true)}<br>${toDMM(r.lon,false)}
 </div>
 `;

 map.setView([r.lat,r.lon],13);
 if(marker) marker.setLatLng([r.lat,r.lon]);
 else marker=L.marker([r.lat,r.lon]).addTo(map);
}

function resetTool(){
 input.value="";
 result.innerHTML="";
 if(marker){map.removeLayer(marker);marker=null;}
}

</script>

</body>
</html>
``
