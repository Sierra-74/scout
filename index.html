<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">

<title>SEMRA S.C.O.U.T</title>

<link rel="manifest" href="manifest.json">

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef2f6;
  color:#222;
}

.header{
  background:#1f2f3a;
  color:white;
  text-align:center;
  padding:14px;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.header img{
  height:42px;
  margin-bottom:5px;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.subtitle{
  font-size:13px;
  opacity:0.85;
}

.container{
  max-width:700px;
  margin:auto;
  padding:15px;
}

.panel{
  background:white;
  padding:18px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

textarea{
  width:100%;
  min-height:90px;
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
  resize:vertical;
  font-size:16px;
}

textarea:focus{
  outline:2px solid #0078d4;
  border-color:#0078d4;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.92;
}

.primary{
  background:#0078d4;
  color:white;
}

.reset{
  background:#777;
  color:white;
}

.result{
  margin-top:16px;
  padding:16px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
  border-radius:6px;
}

.section-title{
  margin-top:14px;
  margin-bottom:5px;
  font-weight:bold;
}

.grid{
  font-size:22px;
  font-weight:bold;
  color:#0078d4;
}

.coord{
  font-family:monospace;
  word-break:break-word;
}

.actions{
  margin-top:15px;
}

.actions button{
  background:#2c3e50;
  color:white;
}

#map{
  height:320px;
  margin-top:15px;
  border-radius:10px;
  overflow:hidden;
}

.signature{
  position:absolute;
  right:10px;
  bottom:6px;
  font-size:11px;
  color:#777;
}

.error{
  color:#b00020;
  font-weight:bold;
  margin-top:12px;
}

</style>

</head>

<body>

<div class="header">

  <img src="icon.png" alt="Logo">

  <div class="title">S.C.O.U.T</div>

  <div class="subtitle">
    SEMRA Coordinate & Orientation Utility Tool
  </div>

</div>

<div class="container">

  <div class="panel" id="captureArea">

    <textarea
      id="input"
      placeholder="Enter coordinates or Eircode&#10;&#10;Examples:&#10;53.3498 -6.2603&#10;D02 X285"
    ></textarea>

    <button class="primary" onclick="convert()">
      Convert & Locate
    </button>

    <button class="reset" onclick="resetTool()">
      Reset
    </button>

    <div id="result"></div>

    <div id="map"></div>

    <div class="signature">S74</div>

  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>

<script>

// ----------------------------
// DOM
// ----------------------------

const input = document.getElementById("input");
const result = document.getElementById("result");

// ----------------------------
// Projections
// ----------------------------

proj4.defs(
  "EPSG:29903",
  "+proj=tmerc +lat_0=53.5 +lon_0=-8 +k=1.000035 " +
  "+x_0=200000 +y_0=250000 +ellps=airy " +
  "+towgs84=482.530,-130.596,564.557,-1.042,-0.214,-0.631,8.15 " +
  "+units=m +no_defs"
);

// ----------------------------
// Map
// ----------------------------

const map = L.map("map").setView([53.5, -8], 7);

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    attribution: "&copy; OpenStreetMap contributors",
    maxZoom: 19
  }
).addTo(map);

let marker;

// ----------------------------
// Coordinate Formatters
// ----------------------------

function toDMS(value, isLat){

  const abs = Math.abs(value);

  const deg = Math.floor(abs);

  const minFloat = (abs - deg) * 60;

  const min = Math.floor(minFloat);

  const sec = ((minFloat - min) * 60).toFixed(2);

  const dir = isLat
    ? (value >= 0 ? "N" : "S")
    : (value >= 0 ? "E" : "W");

  return `${deg}° ${min}' ${sec}" ${dir}`;
}

function toDMM(value, isLat){

  const abs = Math.abs(value);

  const deg = Math.floor(abs);

  const min = ((abs - deg) * 60).toFixed(4);

  const dir = isLat
    ? (value >= 0 ? "N" : "S")
    : (value >= 0 ? "E" : "W");

  return `${deg}° ${min}' ${dir}`;
}

// ----------------------------
// Irish Grid Letter
// ----------------------------

function getGridLetter(E, N){

  if(E < 0 || N < 0){
    return "?";
  }

  const grid = [
    ["V","W","X","Y","Z"],
    ["Q","R","S","T","U"],
    ["L","M","N","O","P"],
    ["F","G","H","J","K"],
    ["A","B","C","D","E"]
  ];

  const row = Math.floor(N / 100000);
  const col = Math.floor(E / 100000);

  if(
    row < 0 ||
    row >= grid.length ||
    col < 0 ||
    col >= grid[0].length
  ){
    return "?";
  }

  return grid[row][col];
}

// ----------------------------
// Parser
// ----------------------------

function parse(raw){

  const cleaned = raw
    .toUpperCase()
    .replace(/,/g, " ")
    .replace(/\s+/g, " ")
    .trim();

  // --------------------------------
  // EIRCODE
  // Example:
  // D02 X285
  // --------------------------------

  const eircode =
    cleaned.match(/^[A-Z0-9]{3}\s?[A-Z0-9]{4}$/);

  if(eircode){

    return {
      type:"EIRCODE",
      value:cleaned.replace(" ", "")
    };
  }

  // --------------------------------
  // IRISH GRID
  // Examples:
  // R888 588
  // R 88888 58888
  // --------------------------------

  const gridMatch =
    cleaned.match(/^([A-Z])\s*(\d{2,5})\s*(\d{2,5})$/);

  if(gridMatch){

    const letter = gridMatch[1];

    let east = gridMatch[2];
    let north = gridMatch[3];

    east = east.padEnd(5, "0");
    north = north.padEnd(5, "0");

    const gridLetters = {

      A:[0,0],
      B:[100000,0],
      C:[200000,0],
      D:[300000,0],
      E:[400000,0],

      F:[0,100000],
      G:[100000,100000],
      H:[200000,100000],
      J:[300000,100000],
      K:[400000,100000],

      L:[0,200000],
      M:[100000,200000],
      N:[200000,200000],
      O:[300000,200000],
      P:[400000,200000],

      Q:[0,300000],
      R:[100000,300000],
      S:[200000,300000],
      T:[300000,300000],
      U:[400000,300000],

      V:[0,400000],
      W:[100000,400000],
      X:[200000,400000],
      Y:[300000,400000],
      Z:[400000,400000]
    };

    if(gridLetters[letter]){

      const offset = gridLetters[letter];

      const E = offset[0] + parseInt(east);
      const N = offset[1] + parseInt(north);

      const result =
        proj4(
          "EPSG:29903",
          "EPSG:4326",
          [E, N]
        );

      return {
        type:"Irish Grid",
        lat: result[1],
        lon: result[0]
      };
    }
  }

  // --------------------------------
  // DECIMAL DEGREES (DD)
  // Example:
  // 53.3498 -6.2603
  // --------------------------------

  const dd =
    cleaned.match(
      /^(-?\d+\.?\d*)\s+(-?\d+\.?\d*)$/
    );

  if(dd){

    const lat = parseFloat(dd[1]);
    const lon = parseFloat(dd[2]);

    if(
      lat >= -90 &&
      lat <= 90 &&
      lon >= -180 &&
      lon <= 180
    ){

      return {
        type:"DD",
        lat,
        lon
      };
    }
  }

  // --------------------------------
  // DDM
  // Example:
  // 53 20.988 N 6 15.618 W
  // --------------------------------

  const ddm =
    cleaned.match(
      /^(\d+)\s+(\d+\.?\d*)\s*([NS])\s+(\d+)\s+(\d+\.?\d*)\s*([EW])$/
    );

  if(ddm){

    let lat =
      parseInt(ddm[1]) +
      parseFloat(ddm[2]) / 60;

    let lon =
      parseInt(ddm[4]) +
      parseFloat(ddm[5]) / 60;

    if(ddm[3] === "S") lat *= -1;
    if(ddm[6] === "W") lon *= -1;

    return {
      type:"DDM",
      lat,
      lon
    };
  }

  // --------------------------------
  // DMS
  // Example:
  // 53 20 59 N 6 15 37 W
  // --------------------------------

  const dms =
    cleaned.match(
      /^(\d+)\s+(\d+)\s+(\d+\.?\d*)\s*([NS])\s+(\d+)\s+(\d+)\s+(\d+\.?\d*)\s*([EW])$/
    );

  if(dms){

    let lat =
      parseInt(dms[1]) +
      parseInt(dms[2]) / 60 +
      parseFloat(dms[3]) / 3600;

    let lon =
      parseInt(dms[5]) +
      parseInt(dms[6]) / 60 +
      parseFloat(dms[7]) / 3600;

    if(dms[4] === "S") lat *= -1;
    if(dms[8] === "W") lon *= -1;

    return {
      type:"DMS",
      lat,
      lon
    };
  }

  return null;
}
function display(lat, lon, type){

  const projected =
    proj4(
      "EPSG:4326",
      "EPSG:29903",
      [lon, lat]
    );

  const E = projected[0];
  const N = projected[1];

  const easting =
    Math.round(E % 100000)
    .toString()
    .padStart(5, "0");

  const northing =
    Math.round(N % 100000)
    .toString()
    .padStart(5, "0");

  const grid =
    `${getGridLetter(E, N)} ${easting} ${northing}`;

  result.innerHTML = `
    <div class="result">

      <b>Detected:</b> ${type}

      <div class="section-title">
        Irish Grid
      </div>

      <div class="grid">
        ${grid}
      </div>

      <div class="section-title">
        Decimal Degrees
      </div>

      <div class="coord">
        ${lat.toFixed(6)},
        ${lon.toFixed(6)}
      </div>

      <div class="section-title">
        DMS
      </div>

      <div class="coord">
        ${toDMS(lat, true)}<br>
        ${toDMS(lon, false)}
      </div>

      <div class="section-title">
        DMM
      </div>

      <div class="coord">
        ${toDMM(lat, true)}<br>
        ${toDMM(lon, false)}
      </div>

      <div class="actions">

        <button onclick="openMaps(${lat}, ${lon})">
          📍 Open in Google Maps
        </button>

        <button onclick="shareWhatsApp(${lat}, ${lon})">
          📤 Share via WhatsApp
        </button>

      </div>

    </div>
  `;

  map.setView([lat, lon], 13);

  if(marker){

    marker.setLatLng([lat, lon]);

  }else{

    marker = L.marker([lat, lon]).addTo(map);
  }
}

// ----------------------------
// Main Convert
// ----------------------------

async function convert(){

  const parsed = parse(input.value);

  if(!parsed){

    result.innerHTML =
      `<div class="error">❌ Invalid input</div>`;

    return;
  }

  // ------------------------
  // Eircode Lookup
  // ------------------------

  if(parsed.type === "EIRCODE"){

    try{

      const response = await fetch(
        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(parsed.value)}+Ireland`
      );

      const data = await response.json();

      if(!data.length){

        result.innerHTML =
          `<div class="error">❌ Eircode not found</div>`;

        return;
      }

      const lat = parseFloat(data[0].lat);
      const lon = parseFloat(data[0].lon);

      display(lat, lon, "Eircode");

    }catch(error){

      console.error(error);

      result.innerHTML =
        `<div class="error">❌ Lookup failed</div>`;
    }

    return;
  }

  // ------------------------
  // Decimal Coordinates
  // ------------------------

  display(parsed.lat, parsed.lon, parsed.type);
}

// ----------------------------
// External Actions
// ----------------------------

function openMaps(lat, lon){

  window.open(
    `https://maps.google.com/?q=${lat},${lon}`,
    "_blank"
  );
}

function shareWhatsApp(lat, lon){

  const text =
    `Location Coordinates:%0A${lat}, ${lon}`;

  window.open(
    `https://wa.me/?text=${text}`,
    "_blank"
  );
}

// ----------------------------
// Reset
// ----------------------------

function resetTool(){

  input.value = "";

  result.innerHTML = "";

  if(marker){

    map.removeLayer(marker);

    marker = null;
  }

  map.setView([53.5, -8], 7);
}

</script>

</body>
</html>
