<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEMRA Coordinate Converter</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<!-- ✅ FIXED: correct tags -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#eef2f6; }

.header {
    background:#2c3e50;
    color:white;
    padding:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

.logo { height:40px; }

.container { max-width:650px; margin:auto; padding:15px; }

.panel {
    background:white;
    padding:20px;
    border-radius:10px;
    position:relative;
}

textarea {
    width:100%;
    height:70px;
    padding:10px;
    font-size:16px;
}

button {
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    background:#0078d4;
    color:white;
}

.reset { background:#666; }

.result {
    margin-top:15px;
    padding:15px;
    background:#f9f9f9;
    line-height:1.6;
}

#map { height:300px; margin-top:15px; }

.signature {
    position:absolute;
    bottom:6px;
    right:10px;
    font-size:11px;
    color:#888;
}
</style>
</head>

<body>

<div class="header">
<img src="https://www.semra.ie/wp-content/uploads/2021/10/semra_logo_196x221_transparent.png" class="logo">
<div>SEMRA Coordinate Converter</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter or paste coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<script>

// ✅ projections
proj4.defs("EPSG:4326","+proj=longlat +datum=WGS84 +no_defs");
proj4.defs("EPSG:29903","+proj=tmerc +lat_0=53.5 +lon_0=-8 +k=1.000035 +x_0=200000 +y_0=250000 +ellps=airy");

// ✅ map
let map = L.map('map').setView([53.4,-8],7);

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{
    maxZoom:17
}).addTo(map);

let marker;

// ✅ helpers
function toDMS(deg,lat){
    let d=Math.floor(Math.abs(deg));
    let m=Math.floor((Math.abs(deg)-d)*60);
    let s=(((Math.abs(deg)-d)*60-m)*60).toFixed(2);
    let dir=lat?(deg>=0?"N":"S"):(deg>=0?"E":"W");
    return `${d}° ${m}' ${s}" ${dir}`;
}

function getGridLetter(E,N){
    const grid=[
        ['V','W','X','Y','Z'],
        ['Q','R','S','T','U'],
        ['L','M','N','O','P'],
        ['F','G','H','J','K'],
        ['A','B','C','D','E']
    ];
    return grid[Math.floor(N/100000)][Math.floor(E/100000)];
}

// ✅ parser (FIXED)
function parse(input){

    input=input.toUpperCase()
    .replace(/_/g," ")
    .replace(/,/g," ")
    .replace(/\s+/g," ")
    .trim();

    let t=input.split(" ");

    // ✅ DMS fixed
    if(t.length>=6){

        let degLat=parseInt(t[0].slice(0,2));
        let minLat=parseInt(t[0].slice(2));
        let secLat=parseFloat(t[1]);

        let degLon=parseInt(t[3].slice(0,2));
        let minLon=parseInt(t[3].slice(2));
        let secLon=parseFloat(t[4]);

        let lat=degLat+(minLat/60)+(secLat/3600);
        let lon=degLon+(minLon/60)+(secLon/3600);

        if(t[2]=="S") lat=-lat;
        if(t[5]=="W") lon=-lon;

        return {
            lat, lon,
            type:"DMS",
            interp:`${toDMS(lat,true)}<br>${toDMS(lon,false)}`
        };
    }

    return null;
}

// ✅ convert
function convert(){

    let res=parse(input.value);

    if(!res){
        result.innerHTML="❌ Invalid input";
        return;
    }

    let lat=res.lat, lon=res.lon;

    let g=proj4("EPSG:4326","EPSG:29903",[lon,lat]);
    let E=g[0]+50, N=g[1]-19;

    let grid=`${getGridLetter(E,N)} ${Math.round(E%100000)} ${Math.round(N%100000)}`;

    result.innerHTML=`
    <div class="result">

    <b>Detected:</b> ${res.type}

    <br><br><b>Interpreted</b><br>${res.interp}

    <br><br><b>Irish Grid</b><br>${grid}

    <br><b>Decimal</b><br>${lat.toFixed(6)}, ${lon.toFixed(6)}

    </div>`;

    map.setView([lat,lon],13);

    if(marker) marker.setLatLng([lat,lon]);
    else marker=L.marker([lat,lon]).addTo(map);
}

// reset
function resetTool(){
    input.value="";
    result.innerHTML="";
    if(marker){ map.removeLayer(marker); marker=null; }
    map.setView([53.4,-8],7);
}

</script>

</body>
</html>
