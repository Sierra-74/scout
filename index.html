<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
<title>SEMRA S.C.O.U.T</title>

<!-- ✅ Manifest -->
<link rel="manifest" href="manifest.json">

<!-- ✅ Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#eef2f6;
}

.header {
  background:#1f2f3a;
  color:white;
  padding:12px;
  text-align:center;
}

.title {
  font-size:22px;
  font-weight:bold;
}

.subtitle {
  font-size:13px;
  opacity:0.85;
}

.container {
  max-width:650px;
  margin:auto;
  padding:15px;
}

.panel {
  background:white;
  padding:18px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  position:relative;
}

.signature {
  position:absolute;
  bottom:6px;
  right:10px;
  font-size:11px;
  color:#777;
}

textarea {
  width:100%;
  height:100px;
  padding:10px;
  font-size:16px;
  border-radius:6px;
  box-sizing:border-box;
}

button {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
}

.reset {
  background:#777;
  color:white;
}

.result {
  margin-top:15px;
  padding:15px;
  background:#f9f9f9;
  border-left:5px solid #0078d4;
}

.section-title {
  margin-top:10px;
  font-weight:bold;
}

.grid {
  font-size:20px;
  font-weight:bold;
  color:#0078d4;
}

.coord {
  font-family:monospace;
}

#map {
  height:300px;
  margin-top:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.png" style="height:40px;">
  <div class="title">S.C.O.U.T</div>
  <div class="subtitle">SEMRA Coordinate & Orientation Utility Tool</div>
</div>

<div class="container">
<div class="panel" id="captureArea">

<textarea id="input" placeholder="Enter coordinates"></textarea>

<button onclick="convert()">Convert & Locate</button>
<button class="reset" onclick="resetTool()">Reset</button>

<div id="result"></div>
<div id="map"></div>

<div class="signature">S74</div>

</div>
</div>

<!-- ✅ Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
